<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <rect width="500" height="300" fill="#0a0a1a"/>

  <!-- Screen -->
  <rect x="60" y="15" width="380" height="22" rx="3" fill="#e8e0d0"/>
  <text x="250" y="31" text-anchor="middle" font-family="Oswald, Arial" font-size="11" font-weight="700" fill="#888" letter-spacing="3">ЭКРАН</text>

  <!-- Seats by rows (simplified) -->
  <!-- Row A — VIP -->
  <rect x="100" y="50" width="300" height="22" rx="3" fill="#f4511e" opacity=".85"/>
  <text x="250" y="65" text-anchor="middle" font-family="Oswald, Arial" font-size="10" fill="white">VIP (1–3 ряды) · 1 200 ₽</text>

  <!-- Row B — Comfort -->
  <rect x="70" y="80" width="360" height="44" rx="3" fill="#1e88e5" opacity=".75"/>
  <text x="250" y="107" text-anchor="middle" font-family="Oswald, Arial" font-size="10" fill="white">Комфорт (4–10 ряды) · 650 ₽</text>

  <!-- Row C — Standard -->
  <rect x="50" y="132" width="400" height="60" rx="3" fill="#43a047" opacity=".7"/>
  <text x="250" y="166" text-anchor="middle" font-family="Oswald, Arial" font-size="10" fill="white">Стандарт (11–20 ряды) · 450 ₽</text>

  <!-- Row D — Back -->
  <rect x="40" y="200" width="420" height="50" rx="3" fill="#8e24aa" opacity=".65"/>
  <text x="250" y="229" text-anchor="middle" font-family="Oswald, Arial" font-size="10" fill="white">Балкон (21–25 ряды) · 350 ₽</text>

  <!-- Aisle markers -->
  <line x1="240" y1="50" x2="240" y2="250" stroke="rgba(255,255,255,.05)" stroke-width="8"/>
  <line x1="260" y1="50" x2="260" y2="250" stroke="rgba(255,255,255,.05)" stroke-width="8"/>

  <text x="250" y="290" text-anchor="middle" font-family="Oswald, Arial" font-size="9" fill="rgba(255,255,255,.2)">AFISHI.RU — СХЕМА КИНОЗАЛА</text>
</svg>
