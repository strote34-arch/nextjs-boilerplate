<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <rect width="500" height="400" fill="#1a1a2e"/>

  <!-- Stage -->
  <rect x="175" y="25" width="150" height="48" rx="8" fill="#c8102e" opacity=".95"/>
  <text x="250" y="54" text-anchor="middle" font-family="Oswald, Arial" font-size="14" font-weight="700" fill="white" letter-spacing="3">С Ц Е Н А</text>

  <!-- Fan zone (field) -->
  <ellipse cx="250" cy="185" rx="70" ry="60" fill="#b71c1c" opacity=".85"/>
  <text x="250" y="180" text-anchor="middle" font-family="Oswald, Arial" font-size="11" fill="white" font-weight="600">Фан-зона</text>
  <text x="250" y="196" text-anchor="middle" font-family="Oswald, Arial" font-size="10" fill="rgba(255,255,255,0.8)">15 000 ₽</text>

  <!-- Parterre ring -->
  <ellipse cx="250" cy="185" rx="105" ry="95" fill="none" stroke="#e53935" stroke-width="18" opacity=".8"/>
  <text x="152" y="145" font-family="Oswald, Arial" font-size="10" fill="#e53935">Партер</text>
  <text x="152" y="157" font-family="Oswald, Arial" font-size="9" fill="rgba(229,57,53,.7)">8 000 ₽</text>

  <!-- Lower tribune -->
  <ellipse cx="250" cy="190" rx="150" ry="138" fill="none" stroke="#f4511e" stroke-width="20" opacity=".7"/>
  <text x="88" y="165" font-family="Oswald, Arial" font-size="10" fill="#f4511e">Трибуна А</text>
  <text x="88" y="177" font-family="Oswald, Arial" font-size="9" fill="rgba(244,81,30,.7)">5 500 ₽</text>

  <!-- Middle tribune -->
  <ellipse cx="250" cy="195" rx="195" ry="178" fill="none" stroke="#1e88e5" stroke-width="18" opacity=".65"/>
  <text x="42" y="195" font-family="Oswald, Arial" font-size="10" fill="#1e88e5">Трибуна Б</text>
  <text x="42" y="207" font-family="Oswald, Arial" font-size="9" fill="rgba(30,136,229,.7)">3 500 ₽</text>

  <!-- Upper tribune -->
  <ellipse cx="250" cy="200" rx="234" ry="188" fill="none" stroke="#43a047" stroke-width="12" opacity=".55"/>
  <text x="6" y="230" font-family="Oswald, Arial" font-size="10" fill="#43a047">Трибуна В</text>
  <text x="6" y="242" font-family="Oswald, Arial" font-size="9" fill="rgba(67,160,71,.7)">1 500 ₽</text>

  <!-- Compass / direction labels -->
  <text x="250" y="398" text-anchor="middle" font-family="Oswald, Arial" font-size="10" fill="rgba(255,255,255,.3)">AFISHI.RU — СХЕМА ЗАЛА</text>
</svg>
