  <rect x="80" y="150" width="340" height="60" rx="5" fill="#1e88e5" opacity=".8"/>
  <text x="250" y="177" text-anchor="middle" font-family="Oswald, Arial" font-size="12" fill="white" font-weight="600">Партер А — ряды 1–10</text>
  <text x="250" y="194" text-anchor="middle" font-family="Oswald, Arial" font-size="11" fill="rgba(255,255,255,.8)">4 500 ₽</text>

