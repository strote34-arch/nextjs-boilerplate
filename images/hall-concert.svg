<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" width="500" height="340">
  <rect width="500" height="340" fill="#1a1a2e"/>

  <!-- Stage -->
  <rect x="150" y="20" width="200" height="45" rx="7" fill="#c8102e" opacity=".95"/>
  <text x="250" y="48" text-anchor="middle" font-family="Oswald, Arial" font-size="14" font-weight="700" fill="white" letter-spacing="3">С Ц Е Н А</text>

  <!-- Fan zone standing -->
  <rect x="130" y="75" width="240" height="65" rx="5" fill="#e53935" opacity=".85"/>
  <text x="250" y="103" text-anchor="middle" font-family="Oswald, Arial" font-size="12" fill="white" font-weight="600">Партер (стоя) — Фан-зона</text>
  <text x="250" y="120" text-anchor="middle" font-family="Oswald, Arial" font-size="11" fill="rgba(255,255,255,.8)">7 500 ₽</text>

