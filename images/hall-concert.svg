  <text x="250" y="245" text-anchor="middle" font-family="Oswald, Arial" font-size="12" fill="white" font-weight="600">Партер Б — ряды 11–25</text>
  <text x="250" y="262" text-anchor="middle" font-family="Oswald, Arial" font-size="11" fill="rgba(255,255,255,.8)">2 800 ₽</text>

  <!-- Balcony -->
