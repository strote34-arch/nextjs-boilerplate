<style>/* ── Header ── */
header {
  background: var(--white);
  border-bottom: 3px solid var(--red);
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  position: sticky; top: 0; z-index: 200;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 16px;
  display: flex; align-items: center; gap: 28px; height: 64px;
}
.header-inner { gap: 12px; }
.logo {
  font-family: 'Oswald', sans-serif;
  font-size: 30px; font-weight: 700;
  color: var(--red); letter-spacing: -1px;
  text-transform: uppercase; flex-shrink: 0;
}
.logo span { color: var(--black); }
.logo { font-size: 24px; }
.logo{font-size:18px !important;}
nav { display: flex; gap: 0; flex: 1; }
nav a {
  font-family: 'Oswald', sans-serif;
  font-size: 13px; font-weight: 400;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 0 13px; height: 64px;
  display: flex; align-items: center;
  color: var(--mid);
  border-bottom: 3px solid transparent;
  margin-bottom: -3px;
  transition: color .15s, border-color .15s;
}
nav a:hover, nav a.active { color: var(--red); border-bottom-color: var(--red); }
nav a { padding: 0 8px; font-size: 12px; }
.city-strip-inner{gap:6px !important;}
.city-strip {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.city-strip-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.city-strip-inner::-webkit-scrollbar { display: none; }
.city-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.city-pill {
  padding: 6px 16px; border: 1.5px solid var(--border);
  border-radius: 20px; font-family: 'Oswald', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  background: var(--white); color: var(--mid); transition: all .15s;
}
.city-pill:hover { border-color: var(--red); color: var(--red); }
.city-pill.active { background: var(--red); border-color: var(--red); color: var(--white); }
.city-pill{font-size:11px !important;padding:4px 10px !important;}

:root{--red:#c8102e;--dark:#0a0a0a;--white:#fff;--border:#e8e6e2;--mid:#666;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;display:flex;flex-direction:column;min-height:100vh;}

/* Sidebar результатов */
.sidebar{position:absolute;right:0;top:0;bottom:0;width:300px;background:#fff;z-index:400;border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:.3s;}

<script>
// switchCity global stub — available immediately for onclick handlers
window.switchCity = function(city, btn) {
  // Update pills immediately (visual feedback)
  document.querySelectorAll('.city-pill').forEach(function(p) {
    p.classList.remove('active');
  });
  if (btn) btn.classList.add('active');
  // Update city label immediately
  var lbl = document.getElementById('cityLabel');
  if (lbl) lbl.textContent = city;
  var hint = document.getElementById('cityHint');
  if (hint) {
    var gen = {'Москва':'Москве','Санкт-Петербург':'Санкт-Петербурге','Екатеринбург':'Екатеринбурге','Казань':'Казани','Новосибирск':'Новосибирске','Краснодар':'Краснодаре','Волгоград':'Волгограде','Нижний Новгород':'Нижнем Новгороде','Ростов-на-Дону':'Ростове-на-Дону','Уфа':'Уфе','Пермь':'Перми','Красноярск':'Красноярске','Воронеж':'Воронеже','Самара':'Самаре','Омск':'Омске','Тюмень':'Тюмени','Иркутск':'Иркутске','Владивосток':'Владивостоке'};
    hint.textContent = gen[city] || city;
  }
  // Delegate to GeoCity when ready, or queue
  if (window.GeoCity && window.GeoCity.setCity) {
    window.GeoCity.setCity(city, 'manual');
  } else {
    window._pendingCity = city;
  }
  // Also update currentCity if defined on the page
  if (typeof currentCity !== 'undefined') window.currentCity = city;
  if (typeof applyFilters === 'function') setTimeout(applyFilters, 0);
  // Save to localStorage immediately
  try { localStorage.setItem('afishi_city', city); } catch(e) {}
  // Перерисовать страницу
  setTimeout(function() {
    if (typeof renderPage === 'function') {
      renderPage(city);
    } else if (typeof window._onGeoCity === 'function') {
      window._onGeoCity(city);
    }
  }, 0);
};
</script>

(function(){
  var raw = location.pathname.split('/').pop() || '';

  var fn = raw.replace(/\.html$/i,'') || 'index';

    document.querySelectorAll('header nav a, header a[href]').forEach(function(a){
      // Убрать все старые стили и классы active
      a.style.color = '';

      a.removeAttribute('aria-current');

        a.style.color = '#c8102e';

      }
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',go);

})();

var _city = localStorage.getItem('afishi_city') || 'Волгоград';
var _cat  = 'all';

  'Волгоград':      [48.7080, 44.5133],

};

var map = L.map('map', {zoomControl: true}).setView(CITY_CENTERS[_city] || [48.7080, 44.5133], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

// ── Маркеры ───────────────────────────────────────────────────────
var markers = [];
var markerLayer = L.layerGroup().addTo(map);

function createIcon(cat, count) {
  var color = CAT_COLORS[cat] || CAT_COLORS.all;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 50" width="36" height="50">'
    + '<path d="M18 0C8 0 0 8 0 18c0 13 18 32 18 32S36 31 36 18C36 8 28 0 18 0z" fill="' + color + '"/>'
    + '<circle cx="18" cy="18" r="11" fill="rgba(255,255,255,0.95)"/>'
    + '<text x="18" y="23" text-anchor="middle" font-size="12" font-weight="900" fill="' + color + '" font-family="Oswald,sans-serif">' + count + '</text>'
    + '</svg>';
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [36, 50],
    iconAnchor: [18, 50],
    popupAnchor: [0, -48],
  });
}

function buildPopup(venue) {
  var evHtml = '';
  venue.events.forEach(function(ev) {
    evHtml += '<a class="popup-event" href="' + ev.url + '">'
      + '<div class="popup-event-date">' + ev.date + '</div>'
      + '<div><div class="popup-event-title">' + ev.icon + ' ' + ev.title + '</div></div>'
      + '</a>';
  });
  return '<div class="popup-header"><div class="popup-venue">' + venue.name + '</div>'
    + '<div class="popup-addr">📍 ' + venue.addr + '</div></div>'
    + '<div class="popup-events">' + evHtml + '</div>'
    + '<div class="popup-footer">'
    + '<a class="popup-btn" href="' + (venue.events[0] && venue.events[0].url || '#') + '">Смотреть события</a>'
    + '</div>';
}

function renderMarkers() {
  markerLayer.clearLayers();
  markers = [];
  var venues = VENUES[_city] || [];
  var shown = 0;

  venues.forEach(function(venue) {
    if (_cat !== 'all' && venue.cat !== _cat) return;
    var icon = createIcon(venue.cat, venue.events.length);
    var m = L.marker([venue.lat, venue.lng], {icon: icon})
      .bindPopup(buildPopup(venue), {maxWidth: 300})
      .addTo(markerLayer);
    markers.push(m);
    shown++;
  });

  document.getElementById('mapCount').textContent = 'Площадок: ' + shown;
}

// ── Переключение города ───────────────────────────────────────────
document.getElementById('citySelect').addEventListener('change', function() {
  _city = this.value;
  localStorage.setItem('afishi_city', _city);
  var center = CITY_CENTERS[_city];
  if (center) map.setView(center, 12);
  renderMarkers();
});

// Установить текущий город
document.getElementById('citySelect').value = _city;

// ── Фильтры категорий ────────────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(function(btn) {
  btn.onclick = function() {
    document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    _cat = btn.dataset.cat;
    renderMarkers();
  };
});

// ── Легенда ───────────────────────────────────────────────────────
var legendEl = document.createElement('div');
legendEl.className = 'legend';
legendEl.style.position = 'absolute';
legendEl.style.bottom = '24px';
legendEl.style.left = '16px';
legendEl.style.zIndex = '400';
legendEl.innerHTML = '<div class="legend-title">Категории</div>'
  + Object.entries(CAT_COLORS).filter(function(e){ return e[0]!=='all'; }).map(function(e){
    var labels = {concert:'Концерты',theater:'Театр',cinema:'Кино',exhibit:'Выставки',kids:'Детям'};
    return '<div class="legend-item"><div class="legend-dot" style="background:'+e[1]+'"></div><span>'+labels[e[0]]+'</span></div>';
  }).join('');
document.getElementById('map').appendChild(legendEl);

// ── Начальный рендер ──────────────────────────────────────────────
renderMarkers();
</script>

<script>
function toggleMobileMenu() {
  var menu = document.getElementById('mobileMenu');
  var overlay = document.getElementById('mobileMenuOverlay');
  var btn = document.getElementById('burgerBtn');
  var isOpen = menu.style.transform === 'translateX(0%)';
  if (isOpen) {
    closeMobileMenu();
  } else {
    menu.style.display = 'flex';
    overlay.style.display = 'block';
    setTimeout(function(){ menu.style.transform = 'translateX(0%)'; }, 10);
    btn && btn.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
}
function closeMobileMenu() {
  var menu = document.getElementById('mobileMenu');
  var overlay = document.getElementById('mobileMenuOverlay');
  var btn = document.getElementById('burgerBtn');
  menu.style.transform = 'translateX(100%)';
  btn && btn.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(function(){
    menu.style.display = 'none';
    overlay.style.display = 'none';
  }, 300);
}
</script>

})();
</script>
